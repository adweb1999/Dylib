name: Build OneStateMod dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Environment
      run: |
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        
    - name: Install Theos
      run: |
        rm -rf $HOME/theos
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        
    - name: Download ImGui
      run: |
        rm -rf imgui
        mkdir -p imgui
        cd imgui
        curl -L "https://github.com/ocornut/imgui/archive/refs/tags/v1.89.9.tar.gz" -o imgui.tar.gz
        tar -xzf imgui.tar.gz --strip-components=1
        rm imgui.tar.gz
        # نسخ ملفات ImGui الأساسية
        cp imgui.cpp imgui.h imgui_draw.cpp imgui_tables.cpp imgui_widgets.cpp imgui_demo.cpp .
        # نسخ backend Metal فقط
        cp backends/imgui_impl_metal.* .
        # إنشاء iOS backend مخصص
        cat > imgui_impl_ios.h << 'EOF'
        #pragma once
        #include "imgui.h"
        #ifdef __OBJC__
        @class UIView;
        @class UIEvent;
        #endif
        IMGUI_IMPL_API bool ImGui_ImplIOS_Init(void* view);
        IMGUI_IMPL_API void ImGui_ImplIOS_Shutdown();
        IMGUI_IMPL_API void ImGui_ImplIOS_NewFrame();
        IMGUI_IMPL_API bool ImGui_ImplIOS_HandleEvent(void* event, void* view);
        EOF
        cat > imgui_impl_ios.mm << 'EOF'
        #include "imgui_impl_ios.h"
        #include "imgui.h"
        #import <UIKit/UIKit.h>
        #import <Foundation/Foundation.h>
        
        bool ImGui_ImplIOS_Init(void* view) {
            ImGuiIO& io = ImGui::GetIO();
            io.BackendPlatformName = "imgui_impl_ios";
            return true;
        }
        
        void ImGui_ImplIOS_Shutdown() {}
        
        void ImGui_ImplIOS_NewFrame() {
            ImGuiIO& io = ImGui::GetIO();
            io.DisplaySize = ImVec2(375, 812);
            io.DeltaTime = 1.0f / 60.0f;
        }
        
        bool ImGui_ImplIOS_HandleEvent(void* event, void* view) {
            return false;
        }
        EOF
        cd ..
        
    - name: Build dylib
      run: |
        export THEOS=$HOME/theos
        make clean
        make
        
    - name: Verify Build
      run: |
        ls -la .theos/obj/
        file .theos/obj/OneStateMod.dylib
        
    - name: Upload dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OneStateMod-dylib
        path: .theos/obj/OneStateMod.dylib
        retention-days: 30
