name: Build OneStateMod dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Environment
      run: |
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        
    - name: Install Theos
      run: |
        rm -rf $HOME/theos
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        
    - name: Download ImGui
      run: |
        rm -rf imgui
        mkdir -p imgui
        cd imgui
        curl -L "https://github.com/ocornut/imgui/archive/refs/tags/v1.89.9.tar.gz" -o imgui.tar.gz
        tar -xzf imgui.tar.gz --strip-components=1
        rm imgui.tar.gz
        # نسخ الملفات بأمان (تجاهل الأخطاء)
        cp imgui.cpp imgui.h imgui_draw.cpp imgui_tables.cpp imgui_widgets.cpp imgui_demo.cpp . 2>/dev/null || true
        cp backends/imgui_impl_metal.* backends/imgui_impl_osx.* . 2>/dev/null || true
        cd ..
        
    - name: Build dylib
      run: |
        export THEOS=$HOME/theos
        make clean
        make
        
    - name: Verify Build
      run: |
        ls -la .theos/obj/
        file .theos/obj/OneStateMod.dylib
        
    - name: Upload dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OneStateMod-dylib
        path: .theos/obj/OneStateMod.dylib
        retention-days: 30
