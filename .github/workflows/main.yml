name: Build OneStateMod dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Environment
      run: |
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        
    - name: Install Theos
      run: |
        rm -rf $HOME/theos
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        
    - name: Install ldid
      run: |
        # تثبيت ldid يدوياً
        curl -L https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_macos_x86_64 -o /usr/local/bin/ldid
        chmod +x /usr/local/bin/ldid
        ldid -v
        
    - name: Download ImGui
      run: |
        rm -rf imgui
        mkdir -p imgui
        cd imgui
        curl -L "https://github.com/ocornut/imgui/archive/refs/tags/v1.89.9.tar.gz" -o imgui.tar.gz
        tar -xzf imgui.tar.gz --strip-components=1
        rm imgui.tar.gz
        mv imgui.cpp imgui.h imgui_draw.cpp imgui_tables.cpp imgui_widgets.cpp imgui_demo.cpp . 2>/dev/null || true
        mv backends/imgui_impl_metal.h backends/imgui_impl_metal.mm . 2>/dev/null || true
        echo '#pragma once' > imgui_impl_osx.h
        echo 'inline void ImGui_ImplOSX_Init(void*) {}' >> imgui_impl_osx.h
        echo 'inline void ImGui_ImplOSX_Shutdown() {}' >> imgui_impl_osx.h
        echo 'inline void ImGui_ImplOSX_NewFrame() {}' >> imgui_impl_osx.h
        echo '#include "imgui_impl_osx.h"' > imgui_impl_osx.mm
        cd ..
        
    - name: Build dylib
      run: |
        export THEOS=$HOME/theos
        export PATH="/usr/local/bin:$PATH"
        make clean
        make
        
    - name: Verify Build
      run: |
        ls -la .theos/obj/
        file .theos/obj/OneStateMod.dylib
        
    - name: Upload dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OneStateMod-dylib
        path: .theos/obj/OneStateMod.dylib
        retention-days: 30
